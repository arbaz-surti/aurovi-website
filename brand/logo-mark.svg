<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <!--
    Aurovi logo mark — dark background variant
    Concept: near-complete circle (time) with 120° amber gap at top (freed time)
    Circle: white (#FFFFFF), Gap: amber (#D97706)
    Primary use: on dark backgrounds (#1F1A14)
  -->
  <path d="M 159 66 A 68 68 0 1 1 41 66" stroke="#FFFFFF" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 41 66 A 68 68 0 0 1 159 66" stroke="#D97706" stroke-width="22" fill="none" stroke-linecap="round"/>
</svg>
